[meta]
name               = "Ministral-3-14B Instruct 4bit"
status             = "testing"
notes              = "Mistral AI Ministral 3 14B (Dec 2025, Apache 2.0). Confirmed real model: mistralai/Ministral-3-14B-Instruct-2512. Native context: 256k tokens. Dense, multimodal: built-in 410M ViT vision encoder (text + images + PDFs). Reported highly decisive agent, edits multiple files well. MLX_OPENCODE_CONTEXT declared at 64k (safe for 14GB KV budget; larger 14B model ~160KB/token KV overhead). 3.5GB activation buffer is lean — reduce MLX_CACHE_BYTES to 12GB if OOM occurs."
model_vram_gb      = 8
gpu_wired_limit_gb = 26

[params]
MLX_MODEL                  = "mlx-community/Ministral-3-14B-Instruct-4bit"
MLX_CACHE_BYTES            = "15032385536"  # 14GB — 26GB cap − 8.5GB model − 3.5GB buffer (lean)
MLX_CACHE_SIZE             = "4"
MLX_MAX_TOKENS             = "8192"
MLX_OPENCODE_CONTEXT       = "65536"        # 64k; compaction fires at ~61k
MLX_OPENCODE_OUTPUT        = "4096"
MLX_OPENCODE_CHUNK_TIMEOUT = "300000"       # 5min — 64k context, tokens should be fast
