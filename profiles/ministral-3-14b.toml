[meta]
name               = "Ministral-3-14B Instruct 4bit"
status             = "testing"
notes              = "Reported highly decisive, edits multiple files well. NOTE: 'Ministral-3-14B' does not match known Mistral model lineup (Ministral comes in 3B and 8B). Verify HF model exists before downloading. 3.5GB activation buffer is lean vs 6GB recommendation but acceptable at 64k context."
model_vram_gb      = 8
gpu_wired_limit_gb = 26

[params]
MLX_MODEL                  = "mlx-community/Ministral-3-14B-Instruct-4bit"
MLX_CACHE_BYTES            = "15032385536"  # 14GB — 26GB cap − 8.5GB model − 3.5GB buffer (lean)
MLX_CACHE_SIZE             = "4"
MLX_MAX_TOKENS             = "8192"
MLX_OPENCODE_CONTEXT       = "65536"        # 64k; compaction fires at ~61k
MLX_OPENCODE_OUTPUT        = "4096"
MLX_OPENCODE_CHUNK_TIMEOUT = "300000"       # 5min — 64k context, tokens should be fast
