[meta]
name               = "Ministral-3-14B Instruct 4bit"
released           = "2025-12"
status             = "broken"
spec_source        = "measured"
notes              = "Mistral AI Ministral 3 14B (Dec 2025, Apache 2.0). KV cache works (mlx-lm): cold prefill ~150 t/s, cached turns 15-22 tokens near-instant (2.83 GB cache). TWO FATAL ISSUES: (1) Mistral chat template raises exception on opencode tool-call role sequence ('roles must alternate') — root cause: the template's alternation counter doesn't reset after tool-call rounds, so parity shifts and user₂ (after a tool round) fires the exception. Patched in chat_templates/ministral-3-14b-patched.jinja by removing raise_exception (ns.index provably unused after check block — fix is safe). (2) Even with patch, model generates hallucinated garbage (fake template YAML with invented file paths) instead of responding to prompts. Likely cause: literal {today} string in template's default system message (not a Jinja2 expression) is rendered as '{today}' and confuses the model. Fundamental incompatibility with opencode agentic setup as of Jun 2026. Note: --use-default-chat-template is a no-op for this model (only activates when tokenizer.chat_template is None). TOKENIZER WARNING: loads with incorrect regex pattern (known cosmetic issue for code/English)."
model_vram_gb      = 8
gpu_wired_limit_gb = 26

[params]
MLX_MODEL                  = "mlx-community/Ministral-3-14B-Instruct-2512-4bit"
MLX_CHAT_TEMPLATE          = "chat_templates/ministral-3-14b-patched.jinja"  # removes strict role alternation check
MLX_CACHE_BYTES            = "15032385536"  # 14GB — 26GB cap − 8.5GB model − 3.5GB buffer (lean)
MLX_CACHE_SIZE             = "4"
MLX_MAX_TOKENS             = "8192"
MLX_OPENCODE_CONTEXT       = "65536"        # 64k; compaction fires at ~61k
MLX_OPENCODE_OUTPUT        = "4096"
MLX_OPENCODE_CHUNK_TIMEOUT = "600000"       # 10min — 14B dense at 64k; be conservative

[benchmarks]
# Measured 2026-06-18, M1 Max 32GB, mlx-lm server, opencode
prefill_cold_tokens    = 17276   # first call context size
prefill_cold_speed_tps = 150     # ~150 t/s (2048 tokens / ~13s chunks)
prefill_cached_tokens  = 15      # turn 2 — only new tokens prefilled
prefill_cached_speed_s = 0.3     # near-instant (cache hit)
cache_size_after_turn1 = "2.83 GB"
cache_growth_per_turn  = "~0.06 GB"
# Session terminated after 2 turns due to Mistral role alternation error
