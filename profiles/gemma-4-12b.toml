[meta]
name               = "Gemma-4-12B Instruct 4bit"
released           = "2026-05"
status             = "untested"
spec_source        = "research"
notes              = "Google Gemma 4 12B (Jun 2026). Native context: 256k tokens. Dense encoder-free architecture: vision (35M embedder), audio, and video fed directly into the LLM backbone — no separate heavy encoders. Strong function-calling adherence reported. MLX_OPENCODE_CONTEXT declared at 64k (safe for 15GB KV budget; at 128k a single session ~8GB KV). Reduce MLX_CACHE_BYTES to 13GB if OOM occurs."
model_vram_gb      = 7
gpu_wired_limit_gb = 26

[params]
MLX_MODEL                  = "mlx-community/gemma-4-12B-it-4bit"
MLX_CACHE_BYTES            = "16106127360"  # 15GB — 26GB cap − 7.5GB model − 3.5GB buffer (lean)
MLX_CACHE_SIZE             = "5"
MLX_MAX_TOKENS             = "8192"
MLX_OPENCODE_CONTEXT       = "65536"        # 64k; compaction fires at ~61k
MLX_OPENCODE_OUTPUT        = "4096"
MLX_OPENCODE_CHUNK_TIMEOUT = "300000"       # 5min — 64k context, tokens should be fast
