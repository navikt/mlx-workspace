[meta]
name               = "Gemma-4-26B A4B MoE 4bit"
released           = "2026-03"
status             = "untested"
spec_source        = "research"
notes              = "Google Gemma 4 26B MoE (2026). MoE: 26B total, ~3.8–4B active per token. 256k native context. Key features: Dual RoPE (prevents context collapse at long range), Shared KV Cache (final attention layers reuse earlier KV — reduces memory per token vs standard models), hybrid local+global attention. Multimodal: text + images + video. Fast inference due to sparse activation (~4B active). 8GB KV headroom + shared KV cache may allow up to 80–100k effective context despite budget. Start conservative at 64k and expand if stable. Apache 2.0."
model_vram_gb      = 14
gpu_wired_limit_gb = 26

[params]
MLX_MODEL                  = "mlx-community/gemma-4-26b-a4b-it-4bit"
MLX_SERVER_TYPE            = "mlx-vlm"              # gemma4_unified requires mlx-vlm, not mlx-lm
MLX_CACHE_BYTES            = "8589934592"   # 8GB — 26GB cap − 14GB model − 4GB activation (only 4B active)
MLX_CACHE_SIZE             = "4"
MLX_MAX_TOKENS             = "8192"
MLX_OPENCODE_CONTEXT       = "65536"        # 64k starting point; shared KV cache may allow more — test carefully
MLX_OPENCODE_OUTPUT        = "4096"
MLX_OPENCODE_CHUNK_TIMEOUT = "300000"       # 5min — MoE with only 4B active should be fast
