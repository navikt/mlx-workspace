[meta]
name               = "Qwen3.5-27B Claude-Opus-Distilled MLX 4bit"
status             = "untested"
spec_source        = "research"
notes              = "Community fine-tune: Qwen3.5-27B base distilled on Claude 4.6 Opus reasoning traces. Deep chain-of-thought reasoning, internal <think> steps, strong coding and planning. Measured on M4 Pro 64GB: ~15.7 t/s generation, ~15.6GB peak RAM. Dense 27B — tight context budget on 32GB Mac: 6GB KV headroom → ~32–40k practical context. Expect slower tokens than 9B. Apache 2.0."
model_vram_gb      = 14
gpu_wired_limit_gb = 26

[params]
MLX_MODEL                  = "mlx-community/Qwen3.5-27B-Claude-4.6-Opus-Distilled-MLX-4bit"
MLX_CACHE_BYTES            = "6442450944"   # 6GB — 26GB cap − 14GB model − 6GB activation buffer
MLX_CACHE_SIZE             = "3"            # tight — 3 sessions max
MLX_MAX_TOKENS             = "8192"
MLX_OPENCODE_CONTEXT       = "32768"        # 32k — conservative given 6GB KV budget
MLX_OPENCODE_OUTPUT        = "4096"
MLX_OPENCODE_CHUNK_TIMEOUT = "600000"       # 10min — dense 27B, slower than smaller models
