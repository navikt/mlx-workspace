[meta]
name               = "Qwen3.5-27B Claude-Opus-Distilled MLX 4bit"
released           = "2026-03"
status             = "oom"
spec_source        = "research"
notes              = "Community fine-tune: Qwen3.5-27B base distilled on Claude 4.6 Opus reasoning traces. Deep chain-of-thought reasoning, internal <think> steps, strong coding and planning. Measured on M4 Pro 64GB: ~15.7 t/s generation, ~15.6GB peak RAM. Dense 27B — tight context budget on 32GB Mac: 6GB KV headroom → ~32–40k practical context. Expect slower tokens than 9B. Apache 2.0. EARLY EVAL (2026-06-19): Tool call reliability is poor — 3× JSONDecodeError (truncated JSON) in first 2-3 turns; Opus distillation may not preserve tool-use capability. Cache slots bumped 3→5 (same fix as Qwen3.6; assistant was never cached with 3 slots)."
model_vram_gb      = 14
gpu_wired_limit_gb = 26

[params]
MLX_MODEL                  = "mlx-community/Qwen3.5-27B-Claude-4.6-Opus-Distilled-MLX-4bit"
MLX_CACHE_BYTES            = "6442450944"   # 6GB — 26GB cap − 14GB model − 6GB activation buffer
MLX_CACHE_SIZE             = "5"            # system(2)+user(2)+assistant(1) — 3 was too few, assistant never cached
MLX_MAX_TOKENS             = "8192"
MLX_OPENCODE_CONTEXT       = "32768"        # 32k — conservative given 6GB KV budget
MLX_OPENCODE_OUTPUT        = "4096"
MLX_OPENCODE_CHUNK_TIMEOUT = "600000"       # 10min — dense 27B, slower than smaller models
