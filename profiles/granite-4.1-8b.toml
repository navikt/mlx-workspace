[meta]
name               = "Granite-4.1-8B Instruct 4bit"
status             = "testing"
notes              = "IBM Granite 4.1 8B. Native context: 131,072 tokens (128k) — confirmed via OpenRouter and IBM docs. Dense architecture. Enterprise-reinforced for strict tool calling: Go, Java, C++, Rust, and language-server adherence. 128k context with 8B model leaves excellent headroom. Cache reduced from 18GB to 16GB vs original config: at 128k tokens, activation buffer needs ~5.5GB (same lesson as Qwen3.5-9B OOM). NOTE: HF path may be mlx-community/granite-4.1-8b-4bit (without '-instruct') — verify before downloading."
model_vram_gb      = 4
gpu_wired_limit_gb = 26

[params]
MLX_MODEL                  = "mlx-community/granite-4.1-8b-instruct-4bit"
MLX_CACHE_BYTES            = "17179869184"  # 16GB — 26GB cap − 4.5GB model − 5.5GB buffer (adjusted from 18GB)
MLX_CACHE_SIZE             = "6"
MLX_MAX_TOKENS             = "8192"
MLX_OPENCODE_CONTEXT       = "131072"       # 128k; compaction fires at ~127k
MLX_OPENCODE_OUTPUT        = "4096"
MLX_OPENCODE_CHUNK_TIMEOUT = "600000"       # 10min — 128k context, slow tokens at large context
