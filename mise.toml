[tools]
python = "latest"
pipx = "latest"

[settings]
env_shell_expand = true

[env]
# ── Active model ───────────────────────────────────────────────────────────────
# Change this block when switching models. See MODELS.md for all options.
#
# MLX_MODEL            — HuggingFace model ID loaded by the server
# MLX_CACHE_BYTES      — KV-cache hard cap in bytes (sum of all open sessions; prevents OOM)
# MLX_CACHE_SIZE       — max concurrent KV caches (one per open conversation)
# MLX_MAX_TOKENS       — max tokens the server generates per request
# MLX_OPENCODE_CONTEXT — context window declared to opencode; auto-compaction fires at
#                        (MLX_OPENCODE_CONTEXT − MLX_OPENCODE_OUTPUT). Set lower than the
#                        model's real context so compaction summarises a small history fast.
# MLX_OPENCODE_OUTPUT  — output token reserve for opencode compaction math.
#                        Intentionally smaller than MLX_MAX_TOKENS: compaction summaries
#                        only need ~2-4k tokens, not the full generation budget.
#
# ── Qwen2.5-Coder-14B — reliable fallback ─────────────────────────────────────
# MLX_MODEL            = "mlx-community/Qwen2.5-Coder-14B-Instruct-4bit"
# MLX_CACHE_BYTES      = "10737418240"  # 10GB — model ~9GB VRAM, ~10GB headroom
# MLX_CACHE_SIZE       = "6"
# MLX_MAX_TOKENS       = "12288"
# MLX_OPENCODE_CONTEXT = "28000"        # compaction at ~24k tokens
# MLX_OPENCODE_OUTPUT  = "4096"
#
# ── Qwen3-Coder-30B-A3B — slow in practice, watch OOM ────────────────────────
# MLX_MODEL            = "mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit"
# MLX_CACHE_BYTES      = "7516192768"   # 7GB  — model ~16GB VRAM, ~9GB headroom
# MLX_CACHE_SIZE       = "4"
# MLX_MAX_TOKENS       = "8192"
# MLX_OPENCODE_CONTEXT = "24000"        # compaction at ~20k tokens
# MLX_OPENCODE_OUTPUT  = "4096"
#
# ── Qwen2.5-Coder-32B — run `mise run vram-set 26` first; OOM risk ────────────
# MLX_MODEL            = "mlx-community/Qwen2.5-Coder-32B-Instruct-4bit"
# MLX_CACHE_BYTES      = "4294967296"   # 4GB  — model ~19GB VRAM, critically low headroom
# MLX_CACHE_SIZE       = "3"
# MLX_MAX_TOKENS       = "4096"
# MLX_OPENCODE_CONTEXT = "16000"        # compaction at ~12k tokens (aggressive = fewer OOM risks)
# MLX_OPENCODE_OUTPUT  = "4096"

# ── Qwen3.5-9B — default, best balance ────────────────────────────────────────
MLX_MODEL            = "mlx-community/Qwen3.5-9B-MLX-4bit"
MLX_CACHE_BYTES      = "19327352832"  # 18GB — model ~6GB VRAM, 26GB cap → ~20GB headroom
MLX_CACHE_SIZE       = "10"           # bytes cap is the real guard; 10 is generous ceiling
MLX_MAX_TOKENS       = "32768"        # model's actual context limit
MLX_OPENCODE_CONTEXT = "32000"        # full model context; compaction at ~28k tokens
MLX_OPENCODE_OUTPUT  = "4096"         # summary reserve (separate from generation budget)

VIRTUAL_ENV = "{{config_root}}/.venv"
_.path = ["{{config_root}}/.venv/bin"]

# ── Setup ─────────────────────────────────────────────────────────────────────

[tasks.setup]
description = "Create and populate the Python venv and install aider"
run = """
python -m venv .venv
.venv/bin/pip install --upgrade pip mlx mlx-lm
pipx install aider-chat --python python3.12 || pipx upgrade aider-chat
"""

# ── Inference ─────────────────────────────────────────────────────────────────

[tasks.run]
description = "Run a single prompt through the model"
depends = ["setup"]
run = """
mlx_lm.generate \
  --model "$MLX_MODEL" \
  --prompt "Explain go generics and when to use them"
"""

[tasks.chat]
description = "Interactive chat with the model (no server needed)"
depends = ["setup"]
run = "mlx_lm.chat --model \"$MLX_MODEL\""

[tasks.server]
description = "Start the OpenAI-compatible HTTP server on port 8080"
depends = ["setup"]
run = """
mlx_lm.server \
  --model "$MLX_MODEL" \
  --port 8080 \
  --max-tokens "$MLX_MAX_TOKENS" \
  --prompt-cache-size "$MLX_CACHE_SIZE" \
  --prompt-cache-bytes "$MLX_CACHE_BYTES"
"""
# Tune MLX_CACHE_BYTES, MLX_CACHE_SIZE, MLX_MAX_TOKENS in [env] above.
# Larger models need smaller cache values — see comments next to each model.

# ── AI coding clients ─────────────────────────────────────────────────────────

[tasks.aider-init]
description = "Generate .aider.conf.yml from current MLX_MODEL (run automatically by aider)"
run = ".mise/tasks/aider-init"

[tasks.aider]
description = "Start aider pointed at the local MLX server"
depends = ["setup", "aider-init"]
run = """
aider \
  --model-metadata-file .aider.model.metadata.json \
  --no-check-update
"""

[tasks.opencode-init]
description = "Generate opencode.json from current MLX_MODEL (run automatically by opencode)"
run = ".mise/tasks/opencode-init"

[tasks.opencode]
description = "Start opencode pointed at the local MLX server"
depends = ["opencode-init"]
run = "opencode"

[tasks.copilot]
description = "Start GitHub Copilot CLI pointed at the local MLX server"
run = "gh copilot"
env = { COPILOT_PROVIDER_BASE_URL = "http://localhost:8080/v1", COPILOT_PROVIDER_TYPE = "openai", COPILOT_PROVIDER_API_KEY = "mlx", COPILOT_MODEL = "$MLX_MODEL", COPILOT_OFFLINE = "true" }

# ── Model management ──────────────────────────────────────────────────────────

[tasks.models-list]
description = "List downloaded models and their sizes"
run = ".mise/tasks/models-list"

[tasks.models-clean]
description = "Interactively remove a downloaded model from the HuggingFace cache"
run = ".mise/tasks/models-clean"

# ── VRAM management ───────────────────────────────────────────────────────────

[tasks.vram-status]
description = "Show current GPU VRAM allocation"
run = ".mise/tasks/vram-status"

[tasks.vram-set]
description = "Set GPU VRAM limit in GB (default: 26GB). Usage: mise run vram-set [GB]"
run = ".mise/tasks/vram-set"

[tasks.vram-reset]
description = "Reset GPU VRAM limit to macOS default (~75% of RAM)"
run = ".mise/tasks/vram-reset"
